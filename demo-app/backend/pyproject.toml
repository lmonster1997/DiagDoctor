[project]
name = "taskflow-backend"
version = "0.1.0"
description = "TaskFlow task management application backend"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "python-jose[cryptography]>=3.3.0",
    "passlib[bcrypt]>=1.7.4",
    "bcrypt>=4.1",
    "structlog>=24.4.0",
    "opentelemetry-api>=1.25.0",
    "opentelemetry-sdk>=1.25.0",
    "opentelemetry-instrumentation-fastapi>=0.46b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.46b0",
    "opentelemetry-exporter-otlp>=1.25.0",
    "email-validator>=2.3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
# Alembic auto-generated migration files — standard pattern places imports after
# revision variables, which triggers E402. Exclude them entirely.
exclude = ["alembic/versions/"]
# B008: FastAPI Depends in function argument defaults is the idiomatic pattern.
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["E402"]
# SQLAlchemy models use quoted forward references (e.g., Mapped["Task"])
# which ruff's F821 doesn't understand — suppress for all model files.
"app/models/*.py" = ["F821"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

# SQLAlchemy forward references in model relationship annotations
[[tool.mypy.overrides]]
module = "app.models.*"
ignore_errors = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
