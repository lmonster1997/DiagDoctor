name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install workspace dependencies
        run: uv sync --all-packages --all-extras

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ruff format check
        run: uv run ruff format --check

      - name: Run mypy (strict)
        run: |
          # Run mypy from each package's own directory to avoid module
          # naming conflicts in this monorepo.  doctor/src, benchmark/src,
          # and bug-factory/src/bug_factory are distinct packages that mypy
          # cannot disambiguate when passed as paths from the repo root.
          # demo-app/backend is NOT a workspace member, so we check it
          # from the repo root (no naming conflict with the other packages).
          set -e
          cd doctor       && uv run mypy --strict src && cd ..
          cd bug-factory  && uv run mypy --strict src && cd ..
          cd benchmark    && uv run mypy --strict src && cd ..
          uv run mypy --strict demo-app/backend/app
        shell: bash

      - name: Run tests
        run: uv run pytest --tb=short
