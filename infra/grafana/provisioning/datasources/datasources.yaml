# ============================================================
# Grafana — Datasource provisioning
#   Auto-configures Loki and Tempo on first start
# ============================================================

apiVersion: 1

deleteDatasources:
  - name: Loki
    orgId: 1
  - name: Tempo
    orgId: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    orgId: 1
    isDefault: true
    version: 1
    editable: false
    jsonData:
      maxLines: 5000
      derivedFields: []

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    orgId: 1
    isDefault: false
    version: 1
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: "loki"
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
        tags: []
      nodeGraph:
        enabled: true
      serviceMap:
        enabled: true
      search:
        enabled: true
