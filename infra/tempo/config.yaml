# ============================================================
# Tempo — Single-instance configuration (filesystem storage)
#   Port 3200: HTTP query API (Grafana reads from here)
#   Port 4317: OTLP gRPC receiver (Collector pushes traces here)
# ============================================================

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        thrift_compact:
          endpoint: 0.0.0.0:6831

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]

metrics_generator:
  storage:
    path: /var/tempo/generator
    remote_write:
      - url: http://localhost:9009  # placeholder (not used in dev)
  registry:
    collection_interval: 15s

usage_report:
  reporting_enabled: false
