[tool.uv.workspace]
members = ["doctor", "bug-factory", "benchmark", "demo-app/backend"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["doctor/tests", "bug-factory/tests"]
markers = [
    "integration: integration tests that require running services (Docker Compose)",
    "smoke: smoke tests that validate the basic pipeline is functional",
    "unit: fast unit tests (default)",
]

[dependency-groups]
dev = [
    "ruff>=0.15.18",
]
