# ============================================================
# DiagDoctor — Docker Compose (development / demo stack)
# ============================================================
# Usage:
#   docker compose up -d          # start all services
#   docker compose down           # stop & remove
#   docker compose logs -f <svc>  # tail logs
#   docker compose ps             # service status
# ============================================================

services:

  # ==========================================================
  # Infrastructure
  # ==========================================================

  postgres:
    image: postgres:16
    container_name: diagdoctor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: diagdoctor-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- OpenTelemetry Collector ----
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: diagdoctor-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/collector.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./infra/otel/collector.yaml:/etc/otel/collector.yaml:ro
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started

  # ---- Loki — Log aggregation ----
  loki:
    image: grafana/loki:3.1.0
    container_name: diagdoctor-loki
    restart: unless-stopped
    user: "0:0"  # run as root for dev; production: use proper UID/GID
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"   # HTTP API
    volumes:
      - ./infra/loki/config.yaml:/etc/loki/config.yaml:ro
      - lokidata:/loki/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Tempo — Trace storage ----
  tempo:
    image: grafana/tempo:2.6.0
    container_name: diagdoctor-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    ports:
      - "3200:3200"   # HTTP query API (Grafana reads from here)
      - "4319:4317"   # OTLP gRPC (Collector pushes traces here; host 4319 → container 4317)
    volumes:
      - ./infra/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - ./infra/tempo/data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Grafana — Dashboards ----
  grafana:
    image: grafana/grafana:latest
    container_name: diagdoctor-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./infra/grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./infra/grafana/dashboards/demo-app.json:/etc/grafana/provisioning/dashboards/demo-app.json:ro
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started

  # ---- Qdrant — Vector database for Doctor RAG ----
  qdrant:
    image: qdrant/qdrant:latest
    container_name: diagdoctor-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrantdata:/qdrant/storage

  # ==========================================================
  # Demo Application
  # ==========================================================

  demo-backend:
    build:
      context: ./demo-app/backend
      dockerfile: Dockerfile
    container_name: diagdoctor-demo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/taskflow
      # JWT
      JWT_SECRET: change-me-in-production-use-a-strong-random-secret
      # OTel
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: demo-backend
      # CORS
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      # General
      DEBUG: "false"
    ports:
      - "8000:8000"

  demo-frontend:
    build:
      context: ./demo-app/frontend
      dockerfile: Dockerfile
    container_name: diagdoctor-demo-frontend
    restart: unless-stopped
    depends_on:
      - demo-backend
    ports:
      - "3000:80"

  # ==========================================================
  # Doctor Agent
  # ==========================================================

  doctor-api:
    build:
      context: ./doctor
      dockerfile: Dockerfile
    container_name: diagdoctor-doctor-api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      # LLM
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      # Embedding
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      # Qdrant
      QDRANT_URL: http://qdrant:6333
      # Loki / Tempo (for evidence collection tools)
      LOKI_URL: http://loki:3100
      TEMPO_URL: http://tempo:3200
      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: doctor-api
      # CORS
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173","http://localhost:3001"]'
    ports:
      - "8001:8000"

# ============================================================
# Volumes
# ============================================================

volumes:
  pgdata:
  redisdata:
  lokidata:
  grafanadata:
  qdrantdata:
