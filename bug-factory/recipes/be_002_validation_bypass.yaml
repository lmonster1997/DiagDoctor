# BE-002: Validation bypass — task status field type relaxed to plain str,
# allowing arbitrary status values to reach the database and cause DataError → 500.
# This is a classic "Pydantic validation weakened" bug.

id: BE-002
title: "任务状态字段校验放宽导致非法状态值触发数据库异常（500 Internal Server Error）"
category: backend_error
severity: high
tags:
  - "validation-bypass"
  - "pydantic"
  - "enum"
  - "dataerror"
  - "500"

expected_diagnosis:
  root_cause: "TaskUpdate schema 的 status 字段类型被从 TaskStatus 枚举弱化为普通 str，导致 Pydantic 不再校验状态值合法性。客户端可传入任意字符串（如 'deleted'），数据库枚举列拒绝该值并抛出 DataError，最终返回 500 Internal Server Error"
  affected_file: "demo-app/backend/app/schemas/task.py"
  affected_line: null
  fix_suggestion: "将 TaskUpdate.status 的类型声明恢复为 TaskStatus | None，利用 Pydantic v2 的枚举校验在请求层拦截非法值，返回 422 Unprocessable Entity 而非让数据库报 500"
  fix_keywords:
    - "TaskStatus"
    - "枚举"
    - "str"
    - "DataError"
    - "500"

injection:
  strategy: code_replace
  target_file: "demo-app/backend/app/schemas/task.py"
  ai_instruction: |
    修改 TaskUpdate 类中 status 字段的类型声明。

    找到这一行：
    ```python
    status: TaskStatus | None = None
    ```
    将其改为：
    ```python
    status: str | None = None
    ```

    同时删除文件顶部对 TaskStatus 的导入（如果 TaskUpdate 是该文件唯一使用 TaskStatus 的地方，则删除该 import 行；如果其他地方还在用，保留 import 但 TaskUpdate 中不再引用）。
    
    注意：
    - 不要修改 TaskCreate 的 status 字段
    - 不要修改 TaskResponse 的 status 字段
    - 只改 TaskUpdate.status 的类型声明
    - 如果 mypy 或 linter 报错，忽略它们（这就是我们想要的 bug）
  diff_patch: null

trigger:
  type: api_call
  steps:
    - action: login
      params:
        email: "admin@example.com"
        password: "Admin123!"
    - action: create_data
      params:
        entity: "project"
        data:
          name: "BE-002 Test Project"
    - action: create_data
      params:
        entity: "task"
        data:
          title: "Normal Task"
          project_index: 0
    - action: api_call
      params:
        method: "PATCH"
        path: "/api/tasks/{task_id}"
        body:
          status: "deleted"
  expected_observation:
    log_patterns:
      - pattern: "DataError|invalid input|500|Internal Server Error|IntegrityError"
        min_occurrences: 1
    trace_attributes:
      "PATCH /api/tasks/{id}":
        status: "error"
    api_response:
      status: 500

evaluation:
  must_mention_keywords:
    - "status"
    - "枚举"
    - "500"
    - "validation"
  should_mention_keywords:
    - "TaskStatus"
    - "DataError"
    - "Pydantic"
    - "str"
    - "422"
  llm_judge_criteria: |
    诊断必须识别出：TaskUpdate 的 status 字段类型被不当地从 TaskStatus 枚举改为普通 str，
    导致 Pydantic 校验失效，非法状态值穿透到数据库层引发 DataError 并返回 500。
    修复应当是恢复枚举类型声明，让 Pydantic 在请求层拦截非法值返回 422 而非 500。
  min_confidence: 0.7
