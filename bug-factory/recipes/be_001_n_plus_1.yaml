id: BE-001
title: 任务列表 N+1 查询导致接口严重变慢
category: performance
severity: high
tags:
- n+1
- sqlalchemy
- orm
- eager-loading
expected_diagnosis:
  root_cause: tasks API 的 list_tasks 端点中，对每个 task 单独查询其 comments 数量，触发 N+1 查询问题
  affected_file: demo-app/backend/app/api/tasks.py
  affected_line: null
  fix_suggestion: 使用 SQLAlchemy selectinload 或 joinedload 预加载 comments 关系，或改为单次聚合子查询统计评论数
  fix_keywords:
  - N+1
  - joinedload
  - selectinload
  - eager loading
  - list_tasks
  retrieval_gold:
    code_chunks:
    - demo-app/backend/app/api/tasks.py::root_cause
    evidence_ids: []
    similar_cases: []
injection:
  strategy: code_replace
  target_file: demo-app/backend/app/api/tasks.py
  ai_instruction: "修改 list_tasks 函数，删除 .options(selectinload(Task.comments)) 预加载。\n\
    改为在获取 tasks 列表后，对每个 task 单独执行一次数据库查询来获取其评论：\n\n```python\ntasks = list(result.scalars().all())\n\
    # N+1: query comments individually for each task\nfor task in tasks:\n    comment_result\
    \ = await db.execute(\n        select(Comment).where(Comment.task_id == task.id)\n\
    \    )\n    _ = comment_result.scalars().all()\nreturn tasks\n```\n\n注意：\n- 必须保留\
    \ `from sqlalchemy.orm import selectinload` 导入（其他地方还在用）\n- 需要新增 `from app.models.comment\
    \ import Comment` 导入\n- 必须使用 async/await 语法，不要用同步的 task.comments 懒加载\n- 最终 list_tasks\
    \ 函数签名和返回类型不要改\n"
  diff_patch: null
trigger:
  type: api_call
  steps:
  - action: login
    params:
      email: admin@example.com
      password: Admin123!
  - action: create_data
    params:
      entity: project
      data:
        name: N+1 Test Project
        description: Project for testing N+1 query bug
  - action: create_data
    params:
      entity: task
      data:
        title: Bulk Task
        project_index: 0
      repeat: 50
  - action: api_call
    params:
      method: GET
      path: /api/projects/{project_id}/tasks
      query:
        include_comments: 'true'
  expected_observation:
    log_patterns:
    - pattern: SELECT.*FROM comments.*WHERE comments.task_id
      min_occurrences: 50
    trace_attributes:
      GET /api/projects/{id}/tasks:
        duration_ms: '>2000'
    api_response: null
  ui_reachable: false
  expected_evidence:
    browser_errors: none
    frontend_spans: expected
    backend_signal: slow query or N+1 pattern
    symptom_tier: frontend
    root_cause_tier: backend
evaluation:
  must_mention_keywords:
  - N+1
  - joinedload
  should_mention_keywords:
  - selectinload
  - 预加载
  - eager
  - list_tasks
  llm_judge_criteria: '诊断必须明确指出 N+1 查询问题——即对每个 task 单独查询其关联数据，

    并建议使用 ORM 的预加载（joinedload/selectinload）或聚合查询来一次性获取所有需要的数据。

    关键词"N+1"必须出现。

    '
  min_confidence: 0.6
categories:
- performance
