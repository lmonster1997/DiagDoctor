id: LOGIC-022
title: 改任务状态点了保存却不生效，其它字段能改
category: logic
severity: high
tags:
- silent-drop
- update_task
- state
- difficulty:L2
expected_diagnosis:
  root_cause: update_task 在应用更新前用 update_data.pop('status', None) 把 status 字段剔除，导致状态更新被静默丢弃
  affected_file: demo-app/backend/app/api/tasks.py
  affected_line: null
  fix_suggestion: 删除 update_data.pop('status', None)，让 status 与其它字段一样写入 task
  fix_keywords:
  - status
  - update_task
  - pop
  - 静默丢弃
  - model_dump
  retrieval_gold:
    code_chunks:
    - demo-app/backend/app/api/tasks.py::root_cause
    evidence_ids: []
    similar_cases: []
injection:
  strategy: code_insert
  target_file: demo-app/backend/app/api/tasks.py
  ai_instruction: '在 update_task 中 update_data = payload.model_dump(exclude_unset=True)
    之后，

    插入 update_data.pop("status", None)，使 status 字段在写回前被剔除。

    '
  diff_patch: "\n--- a/demo-app/backend/app/api/tasks.py\n\n+++ b/demo-app/backend/app/api/tasks.py\n\
    \n@@ -106,1 +106,2 @@\n\n     update_data = payload.model_dump(exclude_unset=True)\n\
    \n+    update_data.pop(\"status\", None)  # BUG(LOGIC-022): status updates silently\
    \ dropped\n"
trigger:
  type: e2e_action
  steps:
  - action: login
    params:
      email: admin@example.com
      password: Admin123!
  - action: create_data
    params:
      entity: project
      data:
        name: 状态测试
        description: status drop
  - action: create_data
    params:
      entity: task
      data:
        title: 待办任务
        project_index: 0
  - action: ui_navigate
    params:
      url: /projects/{project_id}
  - action: wait
    params:
      seconds: 2
  - action: api_call
    params:
      method: PATCH
      path: /api/tasks/{task_id}
      body:
        status: done
  - action: api_call
    params:
      method: GET
      path: /api/tasks/{task_id}
  - action: collect_diff
    params:
      diff_type: silent_data_loss
      description: PATCH status=done 后验证 status 是否真正被更新
      steps:
      - method: GET
        path: /api/tasks/{task_id}
        label: "验证 status 是否生效"
      expectation: PATCH status=done 后 GET 返回的 status 应为 done
      discrepancy: "PATCH 返回 200 但 GET 返回的 status 仍为旧值（非 done），update_data.pop('status') 静默丢弃了状态更新"
  expected_observation:
    log_patterns:
    - pattern: '"method":"PATCH","path":"/api/tasks/.*","status":200'
      min_occurrences: 1
    trace_attributes:
      PATCH /api/tasks/{id}:
        status: OK
    api_response: null
  ui_reachable: true
  expected_evidence:
    browser_errors: none
    frontend_spans: expected
    backend_signal: silent_data_loss
    symptom_tier: backend
    root_cause_tier: backend
    required_signal_types:
    - silent_data_loss
evaluation:
  must_mention_keywords:
  - status
  - update_task
  should_mention_keywords:
  - pop
  - 静默丢弃
  - model_dump
  - 不生效
  llm_judge_criteria: '诊断必须指出 update_task 用 update_data.pop("status", None) 剔除了 status
    字段，

    导致状态更新被静默丢弃（返回 200 但未变更），并建议删除该 pop。

    '
  min_confidence: 0.5
  note: |
    No diff_evidence is provided (removed for authenticity).  Logs show
    200 OK for both PATCH and GET — the silent data loss is invisible in
    observability data.  Doctor must detect the discrepancy from the
    user_report ("status change didn't take effect") and investigate the
    update_task logic.
categories:
- logic
