id: FE-020
title: 打开任务看板整页白屏，控制台报 Cannot read properties of undefined
category: frontend_crash
severity: critical
tags:
- react
- typeerror
- undefined
- cross-layer
- task-board
- api-contract
- difficulty:L4
expected_diagnosis:
  root_cause: |
    前端 SortableTaskCard 渲染时读取 task.tags.length，但列表接口 GET /api/projects/{id}/tasks
    返回的 TaskResponse 列表中不含 tags 字段，task.tags 为 undefined，导致每张卡片渲染时抛
    TypeError 使整个看板崩溃白屏。

    这是 API 契约缺陷 —— 列表接口未返回关联数据（selectinload 仅用于预加载 comments，不含 tags），
    前端却假设 tags 总是存在。真正的根因在后端 schema，而不是前端缺少判空。
  affected_file: demo-app/backend/app/schemas/task.py
  affected_line: null
  fix_suggestion: |
    方案 A（治本）：在 TaskResponse（列表用）schema 中补齐 tags 字段，
    并在 list_tasks 的查询中加入 .options(selectinload(Task.tags))
    方案 B（治标）：前端渲染前判空 task.tags?.length ?? 0 或 (task.tags ?? []).length
    建议两者都做：后端补齐契约 + 前端防御性判空
  fix_keywords:
  - task.tags
  - undefined
  - 可选链
  - TaskResponse
  - 判空
  - 契约
  - selectinload
  retrieval_gold:
    code_chunks:
    - demo-app/backend/app/schemas/task.py::TaskResponse
    - demo-app/frontend/src/pages/TaskBoardPage.tsx::SortableTaskCard
    evidence_ids: []
    similar_cases: []
injection:
  strategy: code_insert
  target_file: demo-app/frontend/src/pages/TaskBoardPage.tsx
  ai_instruction: '在 SortableTaskCard 的优先级 Badge 之后、外层 </div> 之前，插入一段读取

    task.tags.length 的渲染（不加可选链）。因为列表接口不返回 tags，task.tags 为

    undefined，会在每张卡片渲染时抛 TypeError 导致看板白屏。

    '
  diff_patch: "--- a/demo-app/frontend/src/pages/TaskBoardPage.tsx\n+++ b/demo-app/frontend/src/pages/TaskBoardPage.tsx\n\
    @@ -131,2 +131,5 @@\n               )}\n+              {task.tags.length > 0 &&\
    \ (\n+                <span className=\"ml-1 text-xs text-muted-foreground\">{task.tags.length}\
    \ 标签</span>\n+              )}\n             </div>\n"
trigger:
  type: e2e_action
  steps:
  - action: login
    params:
      email: admin@example.com
      password: Admin123!
  - action: create_data
    params:
      entity: project
      data:
        name: 白屏看板
        description: fe crash cross-layer
  - action: create_data
    params:
      entity: task
      data:
        title: 任意任务
        project_index: 0
  - action: ui_click
    params:
      frontend_url: http://localhost:5173/projects/{project_id}
      selector: body
  - action: wait
    params:
      seconds: 5
  expected_observation:
    log_patterns:
    - pattern: client_error.*Cannot read properties of undefined.*length
      min_occurrences: 1
    trace_attributes: {}
    api_response: null
  ui_reachable: true
  expected_evidence:
    browser_errors: expected
    frontend_spans: expected
    backend_signal: 'TaskResponse schema missing tags field in list endpoint'
    symptom_tier: frontend
    root_cause_tier: backend
    cross_layer: true
evaluation:
  must_mention_keywords:
  - task.tags
  - undefined
  - TaskResponse
  should_mention_keywords:
  - 可选链
  - 判空
  - 契约
  - selectinload
  - 后端补齐
  - TypeError
  llm_judge_criteria: |
    诊断必须区分「症状」与「根因」：
    - 症状：前端 SortableTaskCard 读取 task.tags.length 时 undefined 崩溃白屏
    - 根因：后端 GET /api/projects/{id}/tasks 的列表接口 TaskResponse schema 不含 tags 字段（API 契约缺陷）
    - 仅给出"加可选链"的症状补丁、未定位到后端 schema 且未提及 TaskResponse / selectinload 的，记低分（≤ 0.4）
    - 同时给出"后端补齐 tags + 前端防御性判空"双重建议的，记高分（≥ 0.8）
    - 需识别这是跨层 bug（前端症状 + 后端根因），非纯前端问题
  min_confidence: 0.5
  cross_layer_required: true
categories:
- frontend_crash
- backend_error
