id: PERF-021
title: 项目列表页打开变慢，项目越多越卡
category: performance
severity: medium
tags:
- n+1
- sqlalchemy
- list_projects
- difficulty:L2
expected_diagnosis:
  root_cause: list_projects 在返回项目前，对每个 project 单独执行一次 select(Task) 查询，构成 N+1 查询
  affected_file: demo-app/backend/app/api/projects.py
  affected_line: 12
  fix_suggestion: 删除按 project 循环的逐条任务查询；若需任务数请用单条 GROUP BY 聚合或 selectinload 一次性加载
  fix_keywords:
  - N+1
  - list_projects
  - 聚合
  - selectinload
  - per-project
  retrieval_gold:
    code_chunks:
    - demo-app/backend/app/api/projects.py::root_cause
    evidence_ids: []
    similar_cases: []
injection:
  strategy: code_replace
  target_file: demo-app/backend/app/api/projects.py
  ai_instruction: '在 list_projects 拿到 projects 后，对每个 project 用 select(Task).where(Task.project_id
    == project.id)

    单独查询一次，构成 N+1。需新增 from app.models.task import Task。

    '
  diff_patch: "--- a/demo-app/backend/app/api/projects.py\n+++ b/demo-app/backend/app/api/projects.py\n\
    @@ -11,2 +11,3 @@\n from app.models.project import Project\n+from app.models.task\
    \ import Task\n from app.models.user import User\n@@ -24,2 +24,7 @@\n     result\
    \ = await db.execute(select(Project).where(Project.owner_id == current_user.id))\n\
    -    return list(result.scalars().all())\n+    projects = list(result.scalars().all())\n+    for _p in projects:\n+        _r = await db.execute(select(Task).where(Task.project_id\
    \ == _p.id))\n+        _ = _r.scalars().all()\n+    return projects\n"
trigger:
  type: e2e_action
  steps:
  - action: login
    params:
      email: admin@example.com
      password: Admin123!
  - action: create_data
    params:
      entity: project
      data:
        name: 项目
        description: n+1
      repeat: 30
  - action: ui_navigate
    params:
      url: /projects
  - action: wait
    params:
      seconds: 3
  expected_observation:
    log_patterns:
    - pattern: SELECT .* FROM tasks .* WHERE tasks.project_id
      min_occurrences: 30
    trace_attributes:
      GET /api/projects/:
        duration_ms: '>500'
    api_response: null
  ui_reachable: true
  expected_evidence:
    browser_errors: none
    frontend_spans: expected
    backend_signal: slow query or N+1 pattern
    symptom_tier: frontend
    root_cause_tier: backend
evaluation:
  must_mention_keywords:
  - N+1
  should_mention_keywords:
  - list_projects
  - 聚合
  - selectinload
  - per-project
  llm_judge_criteria: '

    诊断必须指出 list_projects 对每个 project 单独查询 tasks 形成 N+1，


    并建议改为聚合或预加载。关键词 "N+1" 必须出现。

    '
  min_confidence: 0.6
categories:
- performance
