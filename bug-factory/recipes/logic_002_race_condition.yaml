id: LOGIC-002
title: 并发编辑同一任务导致数据静默丢失（Last-Write-Wins 竞态条件）
category: logic
severity: high
tags:
- race-condition
- concurrency
- last-write-wins
- optimistic-lock
- data-loss
expected_diagnosis:
  root_cause: update_task 端点缺乏乐观并发控制（Optimistic Concurrency Control），没有使用版本号（version）或
    ETag/If-Match 机制。当两个客户端几乎同时 PATCH 同一任务时，后到达的请求会静默覆盖先到达请求的修改，导致数据丢失而没有任何错误提示
  affected_file: demo-app/backend/app/api/tasks.py
  affected_line: null
  fix_suggestion: 在 Task 模型中添加 version 字段（Integer, default=0），每次 update 时检查 version
    是否匹配并自增。客户端在 PATCH 请求中携带 If-Match 头或 version 字段，服务端在 WHERE 子句中校验 `Task.id == id
    AND Task.version == expected_version`，若匹配行数为 0 则返回 409 Conflict
  fix_keywords:
  - version
  - '409'
  - Conflict
  - 竞态
  - concurrency
  retrieval_gold:
    code_chunks:
    - demo-app/backend/app/api/tasks.py::root_cause
    evidence_ids: []
    similar_cases: []
injection:
  strategy: code_insert
  target_file: demo-app/backend/app/api/tasks.py
  ai_instruction: "在 update_task 端点中注入一个人工延迟，使竞态条件更容易被触发和观察。\n\n1. 在文件顶部 import 区域添加：\n\
    ```python\nimport asyncio\n```\n\n2. 在 update_task 函数中，在执行数据库查询之前，添加一个随机延迟：\n\n\
    修改后的 update_task 函数开头部分：\n```python\n@router.patch(\"/tasks/{task_id}\", response_model=TaskResponse)\n\
    async def update_task(\n    task_id: uuid.UUID,\n    payload: TaskUpdate,\n  \
    \  db: AsyncSession = Depends(get_db),\n    current_user: User = Depends(get_current_user),\n\
    ) -> Task:\n    \"\"\"Update an existing task.\"\"\"\n    # BUG: Artificial delay\
    \ makes race condition deterministic\n    await asyncio.sleep(0.5)\n    \n   \
    \ result = await db.execute(select(Task).where(Task.id == task_id))\n    task\
    \ = result.scalar_one_or_none()\n    if task is None:\n        raise HTTPException(status_code=status.HTTP_404_NOT_FOUND,\
    \ detail=\"任务不存在\")\n    \n    update_data = payload.model_dump(exclude_unset=True)\n\
    \    for field, value in update_data.items():\n        setattr(task, field, value)\n\
    \n    await db.flush()\n    await db.refresh(task)\n    return task\n```\n\n关键要求：\n\
    - 添加 asyncio.sleep(0.5) 延迟（使两个并发请求几乎同时读取、先后写入）\n- 不要添加任何版本检查、乐观锁、或冲突检测逻辑\n- 保留原有的所有\
    \ import 和函数签名\n- 不要删除或修改 docstring\n- 延迟时间不要太长（0.5 秒足够制造竞态窗口）\n"
  diff_patch: null
