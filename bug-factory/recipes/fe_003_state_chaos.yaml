# FE-003: State chaos — race condition causes wrong project's tasks to display
# When switching between projects rapidly, the async fetch for the old project
# can resolve *after* the fetch for the new project, overwriting the correct data.
# This is a classic React race condition caused by missing AbortController / cleanup.

id: FE-003
title: "快速切换项目时看板显示错误项目的任务（状态竞态）"
category: frontend_crash
severity: medium
tags:
  - "race-condition"
  - "stale-closure"
  - "react"
  - "useEffect"
  - "state-chaos"

expected_diagnosis:
  root_cause: "TaskBoardPage 的 fetchTasks 在 useEffect 中触发时没有使用 AbortController 或清理标志（cleanup flag），当用户快速切换项目时，旧项目的异步请求可能在新项目请求之后完成，导致旧项目数据覆盖新项目数据，看板显示出错误项目的任务"
  affected_file: "demo-app/frontend/src/pages/TaskBoardPage.tsx"
  affected_line: null
  fix_suggestion: "在 useEffect 中使用 AbortController 或 cleanup flag（如 let cancelled = false），在请求完成后检查是否仍然有效再设置状态。也可以使用 TanStack Query 的自动去重和缓存机制来避免此类竞态问题。"
  fix_keywords:
    - "AbortController"
    - "cleanup"
    - "race condition"
    - "竞态"
    - "useEffect"

injection:
  strategy: code_insert
  target_file: "demo-app/frontend/src/pages/TaskBoardPage.tsx"
  ai_instruction: |
    在 TaskBoardPage 组件的 fetchTasks 函数中注入一个竞态条件 bug。做以下修改：

    1. 找到 fetchTasks 函数定义（使用 useCallback 包裹的那个 async 函数）。
    2. 删除 useCallback 包裹，将：
       ```tsx
       const fetchTasks = useCallback(async () => {
           if (!projectId) return;
           try {
               setError("");
               const res = await api.get<Task[]>(`/api/projects/${projectId}/tasks`);
               setTasks(res.data);
           } catch (err: unknown) {
               ...
           } finally {
               setLoading(false);
           }
       }, [projectId]);
       ```
       改为直接的 async 函数定义（去掉 useCallback 和依赖数组）：
       ```tsx
       const fetchTasks = async () => {
           if (!projectId) return;
           // BUG: 模拟网络延迟，使竞态条件更容易触发
           const delay = Math.random() * 1500;
           await new Promise((resolve) => setTimeout(resolve, delay));
           try {
               setError("");
               const res = await api.get<Task[]>(`/api/projects/${projectId}/tasks`);
               setTasks(res.data);
           } catch (err: unknown) {
               const msg = (err as { response?: { data?: { detail?: string } } })?.response
                   ?.data?.detail || "加载任务失败";
               console.error("[TASK_LOAD_FAIL]", { projectId, error: msg });
               setError(msg);
           } finally {
               setLoading(false);
           }
       };
       ```

    3. 在 useEffect 中删除对 fetchTasks 的依赖（如果有的话），改为直接调用：
       ```tsx
       useEffect(() => {
           fetchTasks();
           // BUG: 没有返回 cleanup 函数来取消进行中的请求
       }, [projectId]);  // eslint-disable-line react-hooks/exhaustive-deps
       ```

    关键要求：
    - 必须添加随机延迟（Math.random() * 1500），这是使竞态条件从"偶发"变为"必现"的关键
    - 不要添加 AbortController 或任何 cleanup 逻辑
    - 不要添加 isMounted 检查
    - 不要修改 import 语句
    - 保持原有的错误处理代码结构不变
    - 删除 useCallback 时也要删除对应的 import（如果 useCallback 只在这里使用的话）
  diff_patch: null

trigger:
  type: api_call
  steps:
    - action: login
      params:
        email: "admin@example.com"
        password: "Admin123!"
    - action: create_data
      params:
        entity: "project"
        data:
          name: "Project Alpha"
          description: "First project for race condition test"
    - action: create_data
      params:
        entity: "task"
        data:
          title: "Alpha Task 1"
          description: "Belongs to Project Alpha"
          project_index: 0
    - action: create_data
      params:
        entity: "task"
        data:
          title: "Alpha Task 2"
          project_index: 0
    - action: create_data
      params:
        entity: "project"
        data:
          name: "Project Beta"
          description: "Second project for race condition test"
    - action: create_data
      params:
        entity: "task"
        data:
          title: "Beta Task 1"
          description: "Belongs to Project Beta"
          project_index: 1
    - action: create_data
      params:
        entity: "task"
        data:
          title: "Beta Task 2"
          project_index: 1
    - action: api_call
      params:
        method: "GET"
        path: "/api/projects/{project_id_0}/tasks"
    - action: wait
      params:
        seconds: 1
    - action: api_call
      params:
        method: "GET"
        path: "/api/projects/{project_id_1}/tasks"
    - action: wait
      params:
        seconds: 3
  expected_observation:
    log_patterns:
      - pattern: "\\[TASK_LOAD_FAIL\\]"
        min_occurrences: 0
    trace_attributes: {}
    api_response: null

evaluation:
  must_mention_keywords:
    - "竞态"
    - "race condition"
    - "useEffect"
    - "AbortController"
  should_mention_keywords:
    - "cleanup"
    - "取消"
    - "TanStack Query"
    - "isMounted"
    - "closure"
  llm_judge_criteria: |
    诊断必须识别出这是一个典型的 React useEffect 竞态条件（race condition）问题：
    1. 当 projectId 快速变化时，多个异步请求可能同时进行
    2. 由于没有使用 AbortController 或 cleanup flag 来取消旧请求，
       后发起的请求可能先完成，而先发起的请求后完成时会覆盖掉正确数据
    3. 症状表现为：切换到新项目后短暂看到旧项目的任务列表，或最终显示的是错误项目的数据
    
    修复建议必须至少包含以下之一：
    - 使用 AbortController 取消进行中的请求
    - 使用 cleanup flag（如 let cancelled = false）忽略过期响应
    - 使用 TanStack Query 等数据请求库的内置去重/缓存机制
    
    关键词"竞态"或"race condition"必须出现。
  min_confidence: 0.65
