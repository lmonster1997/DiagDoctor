evaluation:
  must_mention_keywords:
  - 竞态
  - race condition
  - useEffect
  - AbortController
  should_mention_keywords:
  - cleanup
  - 取消
  - TanStack Query
  - isMounted
  - closure
  llm_judge_criteria: "诊断必须识别出这是一个典型的 React useEffect 竞态条件（race condition）问题：\n1.\
    \ 当 projectId 快速变化时，多个异步请求可能同时进行\n2. 由于没有使用 AbortController 或 cleanup flag 来取消旧请求，\n\
    \   后发起的请求可能先完成，而先发起的请求后完成时会覆盖掉正确数据\n3. 症状表现为：切换到新项目后短暂看到旧项目的任务列表，或最终显示的是错误项目的数据\n\
    \n修复建议必须至少包含以下之一：\n- 使用 AbortController 取消进行中的请求\n- 使用 cleanup flag（如 let cancelled\
    \ = false）忽略过期响应\n- 使用 TanStack Query 等数据请求库的内置去重/缓存机制\n\n关键词\"竞态\"或\"race condition\"\
    必须出现。\n"
  min_confidence: 0.65
categories:
- frontend_crash
