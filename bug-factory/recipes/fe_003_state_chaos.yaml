id: FE-003
title: 快速切换项目时看板显示错误项目的任务（状态竞态）
category: frontend_crash
severity: medium
tags:
- race-condition
- stale-closure
- react
- useEffect
- state-chaos
expected_diagnosis:
  root_cause: TaskBoardPage 的 fetchTasks 在 useEffect 中触发时没有使用 AbortController 或清理标志（cleanup
    flag），当用户快速切换项目时，旧项目的异步请求可能在新项目请求之后完成，导致旧项目数据覆盖新项目数据，看板显示出错误项目的任务
  affected_file: demo-app/frontend/src/pages/TaskBoardPage.tsx
  affected_line: null
  fix_suggestion: 在 useEffect 中使用 AbortController 或 cleanup flag（如 let cancelled =
    false），在请求完成后检查是否仍然有效再设置状态。也可以使用 TanStack Query 的自动去重和缓存机制来避免此类竞态问题。
  fix_keywords:
  - AbortController
  - cleanup
  - race condition
  - 竞态
  - useEffect
  retrieval_gold:
    code_chunks:
    - demo-app/frontend/src/pages/TaskBoardPage.tsx::root_cause
    evidence_ids: []
    similar_cases: []
injection:
  strategy: code_insert
  target_file: demo-app/frontend/src/pages/TaskBoardPage.tsx
  ai_instruction: "在 TaskBoardPage 组件的 fetchTasks 函数中注入一个竞态条件 bug。做以下修改：\n\n1. 找到\
    \ fetchTasks 函数定义（使用 useCallback 包裹的那个 async 函数）。\n2. 删除 useCallback 包裹，将：\n \
    \  ```tsx\n   const fetchTasks = useCallback(async () => {\n       if (!projectId)\
    \ return;\n       try {\n           setError(\"\");\n           const res = await\
    \ api.get<Task[]>(`/api/projects/${projectId}/tasks`);\n           setTasks(res.data);\n\
    \       } catch (err: unknown) {\n           ...\n       } finally {\n       \
    \    setLoading(false);\n       }\n   }, [projectId]);\n   ```\n   改为直接的 async\
    \ 函数定义（去掉 useCallback 和依赖数组）：\n   ```tsx\n   const fetchTasks = async () => {\n\
    \       if (!projectId) return;\n       // BUG: 模拟网络延迟，使竞态条件更容易触发\n       const\
    \ delay = Math.random() * 1500;\n       await new Promise((resolve) => setTimeout(resolve,\
    \ delay));\n       try {\n           setError(\"\");\n           const res = await\
    \ api.get<Task[]>(`/api/projects/${projectId}/tasks`);\n           setTasks(res.data);\n\
    \       } catch (err: unknown) {\n           const msg = (err as { response?:\
    \ { data?: { detail?: string } } })?.response\n               ?.data?.detail ||\
    \ \"加载任务失败\";\n           console.error(\"[TASK_LOAD_FAIL]\", { projectId, error:\
    \ msg });\n           setError(msg);\n       } finally {\n           setLoading(false);\n\
    \       }\n   };\n   ```\n\n3. 在 useEffect 中删除对 fetchTasks 的依赖（如果有的话），改为直接调用：\n\
    \   ```tsx\n   useEffect(() => {\n       fetchTasks();\n       // BUG: 没有返回 cleanup\
    \ 函数来取消进行中的请求\n   }, [projectId]);  // eslint-disable-line react-hooks/exhaustive-deps\n\
    \   ```\n\n关键要求：\n- 必须添加随机延迟（Math.random() * 1500），这是使竞态条件从\"偶发\"变为\"必现\"的关键\n\
    - 不要添加 AbortController 或任何 cleanup 逻辑\n- 不要添加 isMounted 检查\n- 不要修改 import 语句\n\
    - 保持原有的错误处理代码结构不变\n- 删除 useCallback 时也要删除对应的 import（如果 useCallback 只在这里使用的话）\n"
  diff_patch: null
trigger:
