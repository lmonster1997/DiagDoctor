id: PERF-002
title: 任务详情接口缓存不缓存空结果导致缓存穿透——大量 404 请求击穿缓存直击数据库
category: performance
severity: medium
tags:
- cache-penetration
- negative-cache
- null-cache
- performance
- fastapi
expected_diagnosis:
  root_cause: get_task 端点添加了简易内存缓存，但只缓存了成功查到的任务结果（cache-aside 写入），未缓存'任务不存在'的负面结果。当大量请求查询不存在的随机
    UUID 时，每个请求都穿透缓存执行数据库查询，形成缓存穿透（Cache Penetration），可被用于 DoS 攻击
  affected_file: demo-app/backend/app/api/tasks.py
  affected_line: null
  fix_suggestion: 缓存'任务不存在'的负面结果（如缓存一个特殊标记 None 或 null），设置较短的 TTL（如 30-60 秒），防止恶意请求绕过缓存直达数据库。更好的方案是使用布隆过滤器（Bloom
    Filter）预先过滤不存在的 ID
  fix_keywords:
  - 缓存穿透
  - negative cache
  - None
  - 'null'
  - cache penetration
  retrieval_gold:
    code_chunks:
    - demo-app/backend/app/api/tasks.py::root_cause
    evidence_ids: []
    similar_cases: []
injection:
  strategy: code_insert
  target_file: demo-app/backend/app/api/tasks.py
  ai_instruction: "在 get_task 端点中添加一个简单的内存缓存层，但故意不缓存负面结果。\n\n1. 在文件顶部（import 区域之后、router\
    \ 定义之前）添加：\n```python\n# Simple in-memory cache for task detail\n_task_cache:\
    \ dict[str, Task | None] = {}\n```\n\n2. 修改 get_task 函数，在数据库查询之前添加缓存读取，在查询成功之后添加缓存写入：\n\
    \n修改前：\n```python\n@router.get(\"/tasks/{task_id}\", response_model=TaskDetailResponse)\n\
    async def get_task(\n    task_id: uuid.UUID,\n    db: AsyncSession = Depends(get_db),\n\
    \    current_user: User = Depends(get_current_user),\n) -> Task:\n    \"\"\"Get\
    \ task details, including comments and tags.\"\"\"\n    result = await db.execute(\n\
    \        select(Task)\n        .where(Task.id == task_id)\n        .options(\n\
    \            selectinload(Task.comments),\n            selectinload(Task.tags),\n\
    \        )\n    )\n    task = result.scalar_one_or_none()\n    if task is None:\n\
    \        raise HTTPException(status_code=status.HTTP_404_NOT_FOUND, detail=\"\
    任务不存在\")\n    return task\n```\n\n修改后：\n```python\n@router.get(\"/tasks/{task_id}\"\
    , response_model=TaskDetailResponse)\nasync def get_task(\n    task_id: uuid.UUID,\n\
    \    db: AsyncSession = Depends(get_db),\n    current_user: User = Depends(get_current_user),\n\
    ) -> Task:\n    \"\"\"Get task details, including comments and tags.\"\"\"\n \
    \   # Check cache first\n    cache_key = str(task_id)\n    if cache_key in _task_cache:\n\
    \        cached = _task_cache[cache_key]\n        if cached is not None:\n   \
    \         return cached\n        # BUG: negative result (None) is NOT cached —\
    \ cache penetration!\n    \n    result = await db.execute(\n        select(Task)\n\
    \        .where(Task.id == task_id)\n        .options(\n            selectinload(Task.comments),\n\
    \            selectinload(Task.tags),\n        )\n    )\n    task = result.scalar_one_or_none()\n\
    \    if task is None:\n        # BUG: should cache the negative result here, but\
    \ we don't\n        raise HTTPException(status_code=status.HTTP_404_NOT_FOUND,\
    \ detail=\"任务不存在\")\n    \n    # Cache successful result\n    _task_cache[cache_key]\
    \ = task\n    return task\n```\n\n关键要求：\n- 成功查询的任务结果要缓存（这样才能骗过 code review）\n\
    - 404 的情况绝不缓存（这就是缓存穿透的根因）\n- 不要修改 import 语句（uuid 已经在用了，不需要额外 import）\n- 保留原有的\
    \ docstring\n- 缓存没有过期机制（这也是问题的一部分，但不影响 bug 的核心表现）\n"
  diff_patch: null
