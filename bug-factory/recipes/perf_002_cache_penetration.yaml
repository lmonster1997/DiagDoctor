evaluation:
  must_mention_keywords:
    - "缓存穿透"
    - "cache"
    - "404"
    - "negative"
  should_mention_keywords:
    - "缓存"
    - "None"
    - "Bloom"
    - "布隆过滤器"
    - "null"
  llm_judge_criteria: |
    诊断必须识别出缓存穿透（Cache Penetration）问题：大量查询不存在的任务 ID 时，
    由于负面结果（None/404）没有被缓存，每个请求都会穿透缓存直达数据库。
    修复必须包含缓存负面结果或使用布隆过滤器等方案。
    关键词"缓存穿透"或"cache penetration"必须出现。
  min_confidence: 0.65
