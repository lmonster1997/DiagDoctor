# PERF-001: Missing database index on comments.task_id causing slow queries
# Category: performance — database indexing

id: PERF-001
title: "评论查询缺少数据库索引导致任务详情页加载缓慢"
category: performance
severity: medium
tags: ["database-index", "postgresql", "slow-query", "sqlalchemy"]

expected_diagnosis:
  root_cause: "comments 表的 task_id 列缺少数据库索引，导致按 task_id 查询评论时执行全表扫描（Seq Scan）"
  affected_file: "demo-app/backend/app/models/comment.py"
  affected_line: null
  fix_suggestion: "在 Comment 模型的 task_id 列上添加数据库索引：Index('ix_comments_task_id', 'task_id')，并生成 Alembic 迁移"
  fix_keywords:
    - "index"
    - "task_id"
    - "全表扫描"
    - "Seq Scan"
    - "Alembic"

injection:
  strategy: code_replace
  target_file: "demo-app/backend/app/models/comment.py"
  ai_instruction: |
    在 Comment 模型中，删除 task_id 列上的 index=True 参数（如果存在），
    确保该列没有数据库索引。
    不要修改其他列的定义。
  diff_patch: null

trigger:
  type: api_call
  steps:
    - action: login
      params:
        email: "admin@example.com"
        password: "Admin123!"
    - action: create_data
      params:
        entity: "project"
        data:
          name: "Perf Test Project"
    - action: create_data
      params:
        entity: "task"
        data:
          title: "Task With Many Comments"
          project_index: 0
    - action: api_call
      params:
        method: "POST"
        path: "/api/tasks/{task_id}/comments"
        body:
          content: "Test comment"
        repeat: 200
    - action: wait
      params:
        seconds: 2
    - action: api_call
      params:
        method: "GET"
        path: "/api/tasks/{task_id}"
  expected_observation:
    log_patterns:
      - pattern: "Seq Scan.*comments"
        min_occurrences: 1
    trace_attributes:
      "GET /api/tasks/{id}":
        duration_ms: ">500"
    api_response: null

evaluation:
  must_mention_keywords:
    - "index"
    - "task_id"
    - "慢"
  should_mention_keywords:
    - "全表扫描"
    - "Seq Scan"
    - "Alembic"
    - "迁移"
  llm_judge_criteria: |
    诊断必须识别出 comments 表缺少 task_id 索引导致查询性能下降，
    并建议添加数据库索引以及生成对应的 Alembic 迁移。
  min_confidence: 0.6
