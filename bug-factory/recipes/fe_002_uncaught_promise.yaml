evaluation:
  must_mention_keywords:
  - Promise
  - .map
  - TypeError
  - async
  should_mention_keywords:
  - useEffect
  - useState
  - await
  - 渲染
  - Suspense
  llm_judge_criteria: "诊断必须明确指出两个关键问题：\n1. 在 React 组件渲染期间调用了异步函数但未使用 await，导致返回的 Promise\
    \ 对象被当作数组使用，\n   调用 .map() 方法时抛出 TypeError 使页面崩溃。\n2. 该 Promise 的 rejection 也没有被捕获（unhandled\
    \ promise rejection），\n   这是一个双重错误——既没有正确处理异步数据，也没有处理异步错误。\n修复建议应包含：将异步数据获取移入\
    \ useEffect + useState 管理，或使用 React Suspense + use() hook。\n"
  min_confidence: 0.7
categories:
- frontend_crash
