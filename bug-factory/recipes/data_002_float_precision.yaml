# DATA-002: Precision loss — task priority field changed from int to float,
# causing equality comparisons and arithmetic to fail due to IEEE 754
# floating-point representation errors (e.g., priority * 10 / 10 != priority).

id: DATA-002
title: "任务优先级字段类型从 int 误改为 float 导致等值比较失效（浮点精度丢失）"
category: data
severity: medium
tags:
  - "float"
  - "precision"
  - "ieee754"
  - "type-error"
  - "comparison"

expected_diagnosis:
  root_cause: "Task 模型的 priority 字段类型被从 int 改为 float，同时 TaskCreate/TaskUpdate schema 的 validation 类型也改为 float。当客户端传入 priority=3 时，JSON 反序列化可能产生 3.0 或 2.9999999999999996 等浮点近似值。后续使用 == 进行等值比较（如 priority == 3）时因浮点精度问题失败，导致过滤、排序、高亮逻辑出错"
  affected_file: "demo-app/backend/app/schemas/task.py"
  affected_line: null
  fix_suggestion: "将 priority 字段恢复为 int 类型。任务优先级是离散的整数概念，不应使用浮点数。如果需要小数评分，应使用 Decimal 类型或单独的计算字段，并在比较时使用容差范围（如 abs(a - b) < 1e-6）"
  fix_keywords:
    - "float"
    - "int"
    - "精度"
    - "precision"
    - "IEEE 754"

injection:
  strategy: code_replace
  target_file: "demo-app/backend/app/schemas/task.py"
  ai_instruction: |
    修改 TaskCreate 和 TaskUpdate 中 priority 字段的类型，从 int 改为 float。

    1. 在 TaskCreate 类中，找到：
    ```python
    priority: int = Field(0, ge=0)
    ```
    改为：
    ```python
    priority: float = Field(0.0, ge=0.0)
    ```

    2. 在 TaskUpdate 类中，找到：
    ```python
    priority: int | None = Field(None, ge=0)
    ```
    改为：
    ```python
    priority: float | None = Field(None, ge=0.0)
    ```

    3. 在 TaskResponse 类中，找到：
    ```python
    priority: int
    ```
    也改为（为保持一致性，API 响应也返回 float）：
    ```python
    priority: float
    ```

    注意：
    - 只改 schema 文件中的类型声明
    - 不要修改 models/task.py（数据库模型仍为 Integer，SQLAlchemy 会自动转换）
    - 不要修改其他字段
    - 保持 Field() 的约束条件和默认值语义一致
  diff_patch: null

trigger:
  type: api_call
  steps:
    - action: login
      params:
        email: "admin@example.com"
        password: "Admin123!"
    - action: create_data
      params:
        entity: "project"
        data:
          name: "DATA-002 Float Precision Test"
    - action: create_data
      params:
        entity: "task"
        data:
          title: "Priority 3 Task"
          priority: 3
          project_index: 0
    - action: create_data
      params:
        entity: "task"
        data:
          title: "Priority 0 Task"
          priority: 0
          project_index: 0
    - action: api_call
      params:
        method: "GET"
        path: "/api/projects/{project_id}/tasks"
  expected_observation:
    log_patterns: []
    trace_attributes: {}
    api_response:
      status: 200

evaluation:
  must_mention_keywords:
    - "float"
    - "int"
    - "精度"
    - "priority"
  should_mention_keywords:
    - "IEEE 754"
    - "浮点"
    - "Decimal"
    - "比较"
    - "precision"
  llm_judge_criteria: |
    诊断必须识别出 priority 字段类型从 int 被不当改为 float，
    导致精度丢失和等值比较不可靠的问题。
    修复必须是恢复 int 类型或使用 Decimal。
    关键词 float、int、精度 必须出现。
  min_confidence: 0.55
