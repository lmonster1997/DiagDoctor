id: PERF-003
title: 前端任务看板无清理机制的轮询导致页面离开后持续轰炸后端 API
category: performance
severity: medium
tags:
- polling
- setInterval
- cleanup
- memory-leak
- react
expected_diagnosis:
  root_cause: TaskBoardPage 组件中使用了 setInterval 进行任务列表自动刷新（每 2 秒），但在 useEffect 中没有返回
    cleanup 函数来清除定时器。当用户离开看板页面后，定时器继续运行并调用 fetchTasks()，产生大量无效 API 请求，浪费带宽和后端资源
  affected_file: demo-app/frontend/src/pages/TaskBoardPage.tsx
  affected_line: null
  fix_suggestion: 在 useEffect 中返回 cleanup 函数：return () => clearInterval(intervalId)。或者使用
    React 的 useRef 保存 interval ID 并在组件卸载时清除。更好的方案是使用 TanStack Query 的 refetchInterval
    配合 enabled 选项，自动处理生命周期
  fix_keywords:
  - clearInterval
  - cleanup
  - setInterval
  - unmount
  - useEffect
  retrieval_gold:
    code_chunks:
    - demo-app/frontend/src/pages/TaskBoardPage.tsx::root_cause
    evidence_ids: []
    similar_cases: []
injection:
  strategy: code_insert
  target_file: demo-app/frontend/src/pages/TaskBoardPage.tsx
  ai_instruction: "在 TaskBoardPage 组件中添加一个自动刷新功能，但故意不清理定时器。\n\n1. 在现有的 `useEffect(()\
    \ => { fetchTasks(); }, [fetchTasks]);` 之后，添加一个新的 useEffect：\n\n```tsx\n// Auto-refresh:\
    \ poll for new tasks every 2 seconds\nuseEffect(() => {\n  const intervalId =\
    \ setInterval(() => {\n    fetchTasks();\n  }, 2000);\n  // BUG: No cleanup! Interval\
    \ keeps running after unmount.\n  // Missing: return () => clearInterval(intervalId);\n\
    }, []);  // eslint-disable-line react-hooks/exhaustive-deps\n```\n\n2. 同时，在组件顶部添加一个计数器\
    \ ref 来追踪轮询次数（方便观察 bug 效果）：\n\n```tsx\nconst pollCountRef = useRef(0);\n```\n\n\
    并在 setInterval 回调中递增并打印：\n```tsx\nsetInterval(() => {\n  pollCountRef.current\
    \ += 1;\n  console.log(\"[AUTO_REFRESH_POLL]\", { count: pollCountRef.current,\
    \ projectId });\n  fetchTasks();\n}, 2000);\n```\n\n关键要求：\n- 必须在 useEffect 的依赖数组中使用\
    \ []（空数组），这样 interval 只创建一次\n- 必须不返回 cleanup 函数（这是故意的 bug）\n- 在文件顶部添加 useRef 的\
    \ import（从 react 中导入）\n- 不要修改其他已有的 useEffect 或 fetchTasks 逻辑\n- 不要删除或注释掉现有的 fetchTasks\
    \ useEffect\n- 确保 import { useRef } 被添加到 react import 行中\n"
  diff_patch: null
trigger:
  type: api_call
  steps:
  - action: login
    params:
      email: admin@example.com
      password: Admin123!
  - action: create_data
    params:
      entity: project
      data:
        name: PERF-003 Test Project
  - action: create_data
    params:
      entity: task
      data:
        title: Poll Target Task
        project_index: 0
  - action: api_call
    params:
      method: GET
      path: /api/projects/{project_id}/tasks
  - action: wait
    params:
      seconds: 10
  expected_observation:
    log_patterns:
    - pattern: GET.*\/api\/projects\/.*\/tasks
      min_occurrences: 5
    trace_attributes: {}
    api_response: null
  ui_reachable: false
  expected_evidence:
    browser_errors: none
    frontend_spans: expected
    backend_signal: slow query or N+1 pattern
    symptom_tier: frontend
    root_cause_tier: backend
evaluation:
  must_mention_keywords:
  - clearInterval
  - setInterval
  - cleanup
  - unmount
  should_mention_keywords:
  - 轮询
  - polling
  - useEffect
  - useRef
  - 内存泄漏
  llm_judge_criteria: '诊断必须识别出 setInterval 缺少清除机制（clearInterval）导致组件卸载后仍然持续发出 API
    请求。

    修复建议必须包含在 useEffect 中返回 cleanup 函数来清除定时器。

    关键词 clearInterval、setInterval、cleanup 必须出现。

    '
  min_confidence: 0.7
categories:
- performance
