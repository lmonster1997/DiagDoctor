# FE-001: Null pointer crash when accessing null assignee properties
# Reference: docs/diagdoctor-execution-handbook.md D11 Task 11.2

id: FE-001
title: "任务详情页访问 null assignee 导致崩溃"
category: frontend_crash
severity: high
tags: ["null-pointer", "optional-chaining", "typescript", "react"]

expected_diagnosis:
  root_cause: "TaskDetailPage 渲染 assignee.displayName 时未做 null 检查，当 assignee 为 null 时触发 TypeError"
  affected_file: "demo-app/frontend/src/pages/TaskDetailPage.tsx"
  affected_line: null
  fix_suggestion: "使用可选链 assignee?.displayName 或在渲染前进行显式 null 判断"
  fix_keywords:
    - "?."
    - "null check"
    - "optional chaining"

injection:
  strategy: code_replace
  target_file: "demo-app/frontend/src/pages/TaskDetailPage.tsx"
  ai_instruction: |
    把所有 `assignee?.displayName` 改成 `assignee.displayName`
    把所有 `assignee?.email` 改成 `assignee.email`
    不要修改其他代码
  diff_patch: null

trigger:
  type: e2e_action
  steps:
    - action: login
      params:
        email: "admin@example.com"
        password: "Admin123!"
    - action: create_data
      params:
        entity: "task"
        data:
          title: "Unassigned Task"
          assignee_id: null
    - action: ui_click
      params:
        selector: "[data-testid='task-link-Unassigned Task']"
  expected_observation:
    log_patterns:
      - pattern: "TypeError|Cannot read"
        min_occurrences: 1
    trace_attributes: {}
    api_response: null

evaluation:
  must_mention_keywords:
    - "null"
    - "assignee"
  should_mention_keywords:
    - "可选链"
    - "?."
    - "TypeScript"
  llm_judge_criteria: |
    诊断必须明确指出 assignee 为 null 时访问其属性导致 TypeError，
    并建议使用可选链（?.）或显式 null 检查来修复。
  min_confidence: 0.7
