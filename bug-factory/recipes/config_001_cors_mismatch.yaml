# CONFIG-001: CORS misconfiguration — allow_origins set to ["*"] (wildcard)
# while allow_credentials=True. Browsers reject this combination per the Fetch
# spec: when credentials are included, Access-Control-Allow-Origin cannot be "*".
# Frontend API calls with Authorization header fail with CORS errors.

id: CONFIG-001
title: "CORS 配置 allow_origins=['*'] 与 allow_credentials=True 冲突导致浏览器拦截所有认证请求"
category: config
severity: high
tags:
  - "cors"
  - "credentials"
  - "wildcard"
  - "browser"
  - "fetch-spec"

expected_diagnosis:
  root_cause: "FastAPI 的 CORSMiddleware 配置中 allow_origins 被设为 ['*']（通配符），同时 allow_credentials=True。根据 Fetch 规范，当请求携带凭证（如 Authorization header、Cookie）时，Access-Control-Allow-Origin 不能是通配符 '*'，必须是具体的 origin。浏览器会因此拦截所有携带 JWT token 的 API 请求，导致前端无法正常工作"
  affected_file: "demo-app/backend/app/main.py"
  affected_line: null
  fix_suggestion: "将 allow_origins 从 ['*'] 改为具体的允许域名列表，如 ['http://localhost:3000', 'http://localhost:5173']。如果确实需要允许任意 origin，则必须将 allow_credentials 设为 False（但这会破坏 JWT 认证）。推荐使用环境变量或配置文件管理允许的 origins 列表"
  fix_keywords:
    - "allow_origins"
    - "allow_credentials"
    - "CORS"
    - "*"
    - "wildcard"

injection:
  strategy: code_replace
  target_file: "demo-app/backend/app/main.py"
  ai_instruction: |
    修改 CORS 中间件配置，将 allow_origins 从 settings.cors_origins 改为硬编码的 ['*']。

    找到以下代码块：
    ```python
    # --- CORS: allow frontend dev server to call the API ---
    app.add_middleware(
        CORSMiddleware,
        allow_origins=settings.cors_origins,
        allow_credentials=True,
        allow_methods=["*"],
        allow_headers=["*"],
    )
    ```

    将其改为：
    ```python
    # --- CORS: allow frontend dev server to call the API ---
    app.add_middleware(
        CORSMiddleware,
        allow_origins=["*"],   # BUG: wildcard + credentials = blocked by browser
        allow_credentials=True,
        allow_methods=["*"],
        allow_headers=["*"],
    )
    ```

    关键要求：
    - 必须将 allow_origins 改为 ["*"]（硬编码字符串通配符）
    - 必须保留 allow_credentials=True（这是冲突的关键）
    - 不要修改其他中间件配置
    - 不要删除 settings 的 import（其他地方可能还在用）
    - 这就是 CORS 配置中最经典的错误组合
  diff_patch: null

trigger:
  type: api_call
  steps:
    - action: login
      params:
        email: "admin@example.com"
        password: "Admin123!"
    - action: create_data
      params:
        entity: "project"
        data:
          name: "CONFIG-001 Test"
    - action: api_call
      params:
        method: "GET"
        path: "/api/projects/"
  expected_observation:
    log_patterns:
      - pattern: "CORS|Origin.*not allowed|Access-Control-Allow-Origin"
        min_occurrences: 0
    trace_attributes: {}
    api_response:
      status: 200

evaluation:
  must_mention_keywords:
    - "CORS"
    - "allow_credentials"
    - "allow_origins"
    - "*"
  should_mention_keywords:
    - "通配符"
    - "wildcard"
    - "Fetch"
    - "Access-Control-Allow-Origin"
    - "浏览器"
  llm_judge_criteria: |
    诊断必须识别出 CORS 配置中 allow_origins=['*'] 与 allow_credentials=True 的冲突——
    根据 Fetch 规范，携带凭证的请求不能使用通配符 origin。
    修复必须是使用具体的 origin 列表替代 '*'，或将 allow_credentials 设为 False。
    关键词 CORS、allow_credentials、* 必须出现。
  min_confidence: 0.7
